<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>結婚タスク</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.4.4/lz-string.min.js"></script>

<style>
*{box-sizing:border-box;}
body{
  margin:0;
  font-family:-apple-system;
  background:#f7f7f7;
}

header{
  position:sticky;
  top:0;
  background:#fff;
  padding:14px;
  display:flex;
  justify-content:space-between;
  border-bottom:1px solid #eee;
}

.shareBtn{
  background:#111;
  color:#fff;
  padding:6px 10px;
  border-radius:6px;
  border:none;
  font-size:12px;
}

.container{
  max-width:680px;
  margin:auto;
  padding:14px;
}

.filters{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-bottom:14px;
}

.filters button{
  padding:8px 12px;
  border-radius:20px;
  border:1px solid #ddd;
  background:#fff;
  font-size:12px;
}

.filters button.active{
  background:#111;
  color:#fff;
}

.card{
  display:flex;
  align-items:flex-start;
  gap:10px;
  background:#fff;
  border-radius:12px;
  padding:12px;
  margin-bottom:10px;
  box-shadow:0 2px 6px rgba(0,0,0,0.06);
}

.colorTag{
  width:6px;
  height:48px;
  border-radius:4px;
}

input[type="checkbox"]{
  margin-top:4px;
}

input[type="text"],
input[type="date"],
input[type="time"],
textarea{
  width:100%;
  padding:12px;
  margin-bottom:12px;
  border:1px solid #ddd;
  border-radius:8px;
}

.done{
  opacity:0.4;
  text-decoration:line-through;
}

/* modal */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.3);
  display:none;
  justify-content:center;
  align-items:flex-end;
  z-index:9999;
}

.sheet{
  width:100%;
  max-width:520px;
  background:#fff;
  padding:16px;
  border-radius:16px 16px 0 0;
  max-height:90vh;
  overflow:auto;
}

/* chips */
.chips{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-bottom:14px;
}

.chip{
  padding:8px 12px;
  border-radius:20px;
  color:#fff;
  font-size:13px;
  opacity:0.4;
}

.chip.active{
  opacity:1;
  outline:2px solid #000;
}

/* buttons */
.saveBtn{
  width:100%;
  padding:14px;
  background:#111;
  color:#fff;
  border:none;
  border-radius:10px;
}

.deleteBtn{
  width:100%;
  margin-top:10px;
  padding:14px;
  background:#fff;
  color:#e74c3c;
  border:1px solid #e74c3c;
  border-radius:10px;
}

.fab{
  position:fixed;
  bottom:60px;
  right:20px;
}

.fab button{
  width:45px;
  height:45px;
  border-radius:50%;
  font-size:20px;
  background:#111;
  color:#fff;
  border:none;
}

/* toast */
#toast{
  position:fixed;
  bottom:30px;
  left:50%;
  transform:translateX(-50%);
  background:#111;
  color:#fff;
  padding:10px 14px;
  border-radius:8px;
  font-size:13px;
  opacity:0;
  transition:0.25s;
  pointer-events:none;
}

#toast.show{
  opacity:1;
  transform:translateX(-50%) translateY(-6px);
}

.progressBox{
  background:#fff;
  padding:10px;
  border-radius:10px;
  margin-bottom:12px;
  box-shadow:0 2px 6px rgba(0,0,0,0.05);
}

.progressTitle{
  font-size:12px;
  margin-bottom:6px;
  color:#333;
}

.bar{
  height:8px;
  background:#eee;
  border-radius:999px;
  overflow:hidden;
}

.bar > div{
  height:100%;
  background:#111;
  width:0%;
  transition:0.3s;
}

.progressPercent{
  font-size:11px;
  margin-top:4px;
  color:#666;
}

/* ===== bottom nav ===== */
.bottomNav{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  height:35px;
  background:#fff;
  border-top:1px solid #eee;
  display:flex;
  z-index:100;
}

.navBtn{
  flex:1;
  border:none;
  background:none;
  font-size:12px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  color:#999;
}

.navBtn{
  flex:1;
  border:none;
  background:none;
  font-size:13px;
  color:#999;
  position:relative;
}

/* 選択中 */
.navBtn.active{
  color:#111;
}

/* 下線インジケータ */
.navBtn::after{
  content:"";
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  bottom:0;
  height:6px;
  width:0%;
  background:#111;
  border-radius:3px 3px 0 0;
  transition:0.25s;
}

.navBtn.active::after{
  width:60%;
}

/* 下タブ分の余白 */
.container{
  padding-bottom:90px !important;
}
</style>
</head>

<body>

<header>
<span>結婚タスク</span>
<button class="shareBtn" onclick="share()">共有</button>
</header>

<div class="container">

  <div id="tab-list">

    <div class="filters">
      <button onclick="setFilter('all', this)">すべて</button>
      <button onclick="setFilter('todo', this)">未完了</button>
      <button onclick="setFilter('done', this)">完了</button>
      <button onclick="setFilter('today', this)">今日</button>
      <button onclick="setFilter('week', this)">今週</button>
      <button onclick="setFilter('month', this)">今月</button>
    </div>

    <div id="list"></div>

  </div>

  <div id="tab-progress" style="display:none;">
    <div id="progressWrap"></div>
  </div>

</div>

<div class="fab">
<button onclick="openModal()">＋</button>
</div>

<!-- modal -->
<div id="modal" class="modal">
<div class="sheet">

<div class="chips" id="chips"></div>

<input type="date" id="date">
<input type="time" id="time">
<input type="text" id="place" placeholder="場所">
<textarea id="memo" placeholder="メモ"></textarea>

<button class="saveBtn" onclick="saveTask()">保存</button>
<button class="deleteBtn" id="deleteBtn" onclick="deleteTask()" style="display:none;">削除</button>

</div>
</div>

<div id="toast"></div>

<div class="bottomNav">
  <button class="navBtn active" onclick="switchTab('list', this)">
    タスク
  </button>
  <button class="navBtn" onclick="switchTab('progress', this)">
    進行
  </button>
</div>

<script>

/* ===== state ===== */
const CATEGORY = {
"STEP1 意思決定": {
  color: "#e74c3c",
  items: [
    "プロポーズ",
    "結婚時期の決定"
  ]
},

"STEP2 家族・関係調整": {
  color: "#e67e22",
  items: [
    "両家への報告",
    "両家挨拶",
    "顔合わせ日程調整",
    "親への相談"
  ]
},

"STEP3 法的手続き": {
  color: "#3498db",
  items: [
    "婚姻届準備",
    "証人依頼",
    "戸籍確認",
    "名義変更手続き"
  ]
},

"STEP4 お金・契約": {
  color: "#f39c12",
  items: [
    "銀行口座整理",
    "保険見直し",
    "家計設計",
    "賃貸/契約見直し"
  ]
},

"STEP5 生活準備": {
  color: "#27ae60",
  items: [
    "新居探し",
    "引越し準備",
    "家具・家電購入",
    "インフラ契約"
  ]
},

"STEP6 式準備": {
  color: "#9b59b6",
  items: [
    "式場選定",
    "衣装決定",
    "招待状作成",
    "演出決定"
  ]
},

"STEP7 仕上げ": {
  color: "#2c3e50",
  items: [
    "結婚指輪",
    "前撮り/写真",
    "ハネムーン計画"
  ]
}
};

let tasks=[];
let selectedSub=null;
let editId=null;
let currentFilter="all";

/* ===== toast ===== */
function showToast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg;
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),1500);
}

/* ===== URL load ===== */
(function(){
  const p=new URLSearchParams(location.search).get("d");
  if(p){
    try{
      tasks=JSON.parse(LZString.decompressFromEncodedURIComponent(p))||[];
    }catch(e){
      tasks=[];
    }
  }
})();

/* ===== URL save ===== */
function updateURL(){
  const c=LZString.compressToEncodedURIComponent(JSON.stringify(tasks));
  history.replaceState(null,"","?d="+c);
}

/* ===== share ===== */
function share(){
  navigator.clipboard.writeText(location.href);
  showToast("URLをコピーしました");
}

/* ===== filter ===== */
function setFilter(f, el){
  currentFilter=f;

  document.querySelectorAll(".filters button")
    .forEach(b=>b.classList.remove("active"));

  el.classList.add("active");

  render();
}

/* ===== open modal（←消さない） ===== */
function openModal(id=null){
  modal.style.display="flex";

  initChips();

  editId=id;

  if(id){
    let t=tasks.find(x=>x.id===id);
    selectedSub=t.sub;
    date.value=t.date;
    time.value=t.time;
    place.value=t.place;
    memo.value=t.memo;
    deleteBtn.style.display="block";
  }else{
    deleteBtn.style.display="none";
    selectedSub=null;
    date.value="";
    time.value="";
    place.value="";
    memo.value="";
  }
}

/* ===== chips ===== */
function initChips(){
chips.innerHTML="";
for(let k in CATEGORY){
CATEGORY[k].items.forEach(sub=>{
let el=document.createElement("div");
el.className="chip";
el.style.background=CATEGORY[k].color;
el.textContent=sub;

el.onclick=()=>{
document.querySelectorAll(".chip").forEach(c=>c.classList.remove("active"));
el.classList.add("active");
selectedSub=sub;
};

chips.appendChild(el);
});
}
}

/* ===== close modal ===== */
modal.addEventListener("click",(e)=>{
if(e.target===modal){
modal.style.display="none";
editId=null;
selectedSub=null;
}
});

/* ===== save ===== */
function saveTask(){
if(!selectedSub)return;

let data={
id:editId||Math.random().toString(36).slice(2),
sub:selectedSub,
date:date.value,
time:time.value,
place:place.value,
memo:memo.value,
done:false
};

if(editId){
tasks=tasks.map(t=>t.id===editId?data:t);
}else{
tasks.push(data);
}

updateURL();
modal.style.display="none";
render();
showToast("保存しました");
}

/* ===== delete ===== */
function deleteTask(){
  const ok = confirm("本当に削除しますか？");

  if(!ok){
    showToast("キャンセルしました");
    return;
  }

  tasks = tasks.filter(t => t.id !== editId);
  updateURL();
  modal.style.display = "none";
  render();
  showToast("削除しました");
}

function calcProgress(){
  let result = [];

  for(let key in CATEGORY){
    let items = CATEGORY[key].items;

    let total = tasks.filter(t => items.includes(t.sub)).length;
    let done = tasks.filter(t => items.includes(t.sub) && t.done).length;

    let percent = total === 0 ? 0 : Math.round((done / total) * 100);

    result.push({
      name: key,
      percent,
      color: CATEGORY[key].color
    });
  }

  return result;
}

function renderProgress(){
  const wrap = document.getElementById("progressWrap");
  wrap.innerHTML = "";

  const data = calcProgress();

  data.forEach(p => {
    const box = document.createElement("div");
    box.className = "progressBox";

    box.innerHTML = `
      <div class="progressTitle">${p.name}</div>
      <div class="bar">
        <div style="width:${p.percent}%; background:${p.color}"></div>
      </div>
      <div class="progressPercent">${p.percent}%</div>
    `;

    wrap.appendChild(box);
  });
}

/* ===== render ===== */
function render(){
list.innerHTML="";

let filtered=tasks.filter(t=>{
if(currentFilter==="todo")return !t.done;
if(currentFilter==="done")return t.done;
return true;
});

filtered.forEach(t=>{

let div=document.createElement("div");
div.className="card "+(t.done?"done":"");

let color=document.createElement("div");
color.className="colorTag";

for(let k in CATEGORY){
if(CATEGORY[k].items.includes(t.sub)){
color.style.background=CATEGORY[k].color;
}
}

let check=document.createElement("input");
check.type="checkbox";
check.checked=t.done;

check.onclick=(e)=>{
e.stopPropagation();
t.done=!t.done;
updateURL();
render();
};

let info=document.createElement("div");
info.innerHTML=`
<div>${t.sub}</div>
<div style="font-size:12px;color:#888;">${t.date||"期限なし"}</div>
`;

div.onclick=()=>openModal(t.id);

div.append(color,check,info);
list.appendChild(div);

});
renderProgress();
}

function switchTab(tab, el){
  document.querySelectorAll(".navBtn").forEach(b=>b.classList.remove("active"));
  el.classList.add("active");

  document.getElementById("tab-list").style.display =
    tab==="list" ? "block" : "none";

  document.getElementById("tab-progress").style.display =
    tab==="progress" ? "block" : "none";
}

render();

</script>

</body>
</html>
