```html
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>結婚準備チェック</title>

<!-- 検索に出さない -->
<meta name="robots" content="noindex, nofollow">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body { font-family: sans-serif; margin:0; background:#f2f2f2; }
header { position:sticky; top:0; background:#fff; padding:10px; }
.container { padding:10px; }
.card { background:#fff; border-radius:10px; padding:10px; margin-bottom:10px; }
.fixed { position:fixed; bottom:0; width:100%; display:flex; }
button { flex:1; padding:15px; border:none; font-size:16px; }
.pdf { background:#4caf50; color:#fff; }
.share { background:#2196f3; color:#fff; }
.progress { height:6px; background:#ddd; }
.bar { height:100%; background:#4caf50; width:0%; }
textarea, input { width:100%; margin-top:5px; padding:8px; }
label { display:block; margin:5px 0; }
</style>
</head>

<body>

<header>
  <h3>結婚準備チェック</h3>
  <div class="progress"><div class="bar" id="bar"></div></div>
</header>

<div class="container">

<div class="card">
  <input id="date" type="date" placeholder="入籍日">
  <textarea id="memo" placeholder="メモ"></textarea>
</div>

<div id="list"></div>

</div>

<div class="fixed">
<button class="share" onclick="share()">共有</button>
<button class="pdf" onclick="pdf()">PDF</button>
</div>

<script>
const data = [
["事前準備",["意思確認","両家挨拶","顔合わせ","指輪","資金計画","ライフプラン"]],
["結婚準備",["入籍日決定","婚姻届","証人依頼","式場検討","旅行計画"]],
["生活",["新居","引越し","家具家電","ネット契約","ライフライン"]],
["手続き",["住民票","保険","年金","免許証"]],
["名義変更",["銀行","カード","携帯","保険","サブスク"]]
];

function render(){
  const list=document.getElementById("list");
  list.innerHTML="";

  data.forEach((sec,si)=>{
    const div=document.createElement("div");
    div.className="card";
    div.innerHTML=`<h4>${sec[0]}</h4>`;

    sec[1].forEach((item,ii)=>{
      const id=`c_${si}_${ii}`;
      const checked=localStorage.getItem(id)==="1";

      div.innerHTML+=`
      <label>
        <input type="checkbox" id="${id}" ${checked?"checked":""}
        onchange="save('${id}')">
        ${item}
      </label>`;
    });

    list.appendChild(div);
  });

  loadInputs();
  progress();
}

function save(id){
  localStorage.setItem(id, document.getElementById(id).checked?"1":"0");
  progress();
}

function loadInputs(){
  ["date","memo"].forEach(id=>{
    const el=document.getElementById(id);
    el.value=localStorage.getItem(id)||"";
    el.oninput=()=>localStorage.setItem(id,el.value);
  });
}

function progress(){
  const all=document.querySelectorAll("input[type=checkbox]");
  const done=[...all].filter(c=>c.checked).length;
  document.getElementById("bar").style.width=(done/all.length*100)+"%";
}

function pdf(){
  const { jsPDF } = window.jspdf;
  const doc=new jsPDF();
  let y=10;

  doc.text("結婚準備チェック",10,y); y+=10;

  data.forEach((sec,si)=>{
    doc.text(sec[0],10,y); y+=8;

    sec[1].forEach((item,ii)=>{
      const id=`c_${si}_${ii}`;
      const checked=localStorage.getItem(id)==="1";
      doc.text((checked?"✔ ":"□ ")+item,10,y);
      y+=6;
    });

    y+=5;
  });

  doc.save("checklist.pdf");
}

function share(){
  const state={};

  document.querySelectorAll("input[type=checkbox]").forEach(cb=>{
    state[cb.id]=cb.checked?1:0;
  });

  state.date=document.getElementById("date").value;
  state.memo=document.getElementById("memo").value;

  const url = location.origin + location.pathname +
    "?data=" + btoa(JSON.stringify(state));

  prompt("共有URL👇", url);
}

function loadShare(){
  const params=new URLSearchParams(location.search);
  const d=params.get("data");
  if(!d) return;

  const obj=JSON.parse(atob(d));
  Object.keys(obj).forEach(k=>localStorage.setItem(k,obj[k]));
}

loadShare();
render();
</script>

</body>
</html>
```
